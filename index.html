<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- title-->
  <title>SwiftCart-E-Commerce</title>
  <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- font integration -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- daisyui + tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css"/>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- stylesheet -->
  <link rel="stylesheet" href="style.css">

  </head>

  <body>
    <!-- Navbar -->
    <nav class="sticky top-0 z-50 px-4 shadow-lg navbar bg-base-100 md:px-8">

      <div class="navbar-start">
        <a href="./index.html" class="text-xl font-bold md:text-2xl text-primary md:ml-25">SwiftCart</a>
      </div>

      <!-- Center: Menu Items -->
      <!-- Desktop Menu -->
      <div class="hidden navbar-center lg:flex">
        <ul class="gap-2 px-1 menu menu-horizontal">
          <li><a href="./index.html" class="font-medium link-primary">Home</a></li>
          <li><a href="#products" class="font-medium">Products</a></li>
          <li><a href="#about" class="font-medium">About</a></li>
          <li><a href="#contact" class="font-medium">Contact</a></li>
        </ul>
      </div>

      <!-- Right: Cart Icon & Mobile Menu -->
      <div class="gap-2 navbar-end">
        <!-- Cart Icon with Badge -->
        <button class="btn btn-ghost btn-circle indicator md:mr-25">
          <!-- <span class="text-xs indicator-item badge badge-primary"></span> -->
          <i class="text-lg fas fa-shopping-cart"></i>
        </button>

        <!-- Mobile Menu Toggle -->
        <div class="dropdown dropdown-end lg:hidden">
          <button tabindex="0" class="btn btn-ghost btn-circle">
            <i class="text-lg fas fa-bars"></i>
          </button>
          <ul tabindex="0" class="dropdown-content z-[1] menu p-2 shadow bg-base-100 rounded-box w-52">
            <li><a href="#home">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>


    <script src="script.js"></script>
  </body>
</html>
